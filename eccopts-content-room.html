<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#2a1411" />
<title>Content Room · ECCOPTS</title>
<link rel="icon" href="https://eccopts.ca/wp-content/uploads/2020/03/eccopts-logo-temporary-1.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />

<!-- Supabase wiring (already set). Shared wall lives in your project. -->
<script>
  window.ECCOPTS_CONFIG = {
    SUPABASE_URL: "https://rdzgdftahsrxdousvaiy.supabase.co",
    SUPABASE_ANON_KEY: "sb_publishable_fnZsP4yquXFsRUJK-H6-ow_vRAcQlUG",
  };
</script>

<style>
  :root {
    --paper:   oklch(97% 0.011 70);
    --paper-2: oklch(99% 0.006 70);
    --ink:     oklch(26% 0.022 40);
    --ink-2:   oklch(50% 0.02 45);
    --ink-3:   oklch(66% 0.016 50);
    --line:    oklch(90% 0.014 65);
    --oxblood: oklch(40% 0.115 27);
    --gold:    oklch(64% 0.1 78);
    --ground:  oklch(17% 0.028 32);
    --on-dark: oklch(95% 0.012 75);
    --ease: cubic-bezier(0.23, 1, 0.32, 1);
    --tab-h: 62px;
    --w: 460px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "DM Sans", system-ui, sans-serif; color: var(--ink); line-height: 1.5;
    -webkit-font-smoothing: antialiased; background: var(--ground); overflow-x: hidden;
  }
  .app { max-width: var(--w); margin: 0 auto; min-height: 100dvh; background: var(--paper); display: flex; flex-direction: column; }
  h1, h2, h3, .serif { font-family: "Cormorant Garamond", Georgia, serif; font-weight: 600; letter-spacing: -0.01em; }

  /* header */
  .top { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; justify-content: center; gap: 9px;
    padding: calc(env(safe-area-inset-top) + 14px) 18px 14px; background: var(--ground); }
  .top img { height: 22px; }
  .top span { font-family: "Cormorant Garamond"; font-size: 1.12rem; color: var(--on-dark); letter-spacing: 0.01em; }

  main { flex: 1; }
  .view { display: none; padding: 30px 22px calc(var(--tab-h) + env(safe-area-inset-bottom) + 36px); }
  .view.on { display: block; }

  /* add */
  .h-serif { font-size: 2.2rem; color: var(--ink); line-height: 1.05; }
  .sub { color: var(--ink-2); font-size: 0.96rem; margin-top: 8px; margin-bottom: 30px; }
  .lbl { font-size: 0.74rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 11px; display: block; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 26px; }
  .chip { font-size: 0.88rem; color: var(--ink); background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 100px; padding: 9px 15px; cursor: pointer; transition: all .18s var(--ease); min-height: 40px; }
  .chip[aria-pressed="true"] { background: var(--oxblood); border-color: var(--oxblood); color: var(--on-dark); }
  .chip:active { transform: scale(0.97); }
  input, textarea { width: 100%; font-family: "DM Sans"; font-size: 16px; color: var(--ink); background: var(--paper-2);
    border: 1px solid var(--line); border-radius: 13px; padding: 14px; margin-bottom: 26px; transition: border-color .2s var(--ease); }
  textarea { resize: none; min-height: 84px; line-height: 1.5; }
  input::placeholder, textarea::placeholder { color: var(--ink-3); }
  input:focus, textarea:focus { outline: none; border-color: var(--gold); }
  .add-btn { width: 100%; font-family: "DM Sans"; font-weight: 600; font-size: 1rem; color: var(--on-dark);
    background: var(--oxblood); border: 0; border-radius: 14px; padding: 16px; cursor: pointer; transition: transform .12s ease; }
  .add-btn:active { transform: scale(0.98); }

  /* wall */
  .grp { margin-bottom: 34px; }
  .grp h3 { font-size: 1.45rem; color: var(--ink); margin-bottom: 4px; }
  .grp .rule { width: 30px; height: 2px; background: var(--gold); border-radius: 2px; margin-bottom: 14px; }
  .item { padding: 13px 0; border-bottom: 1px solid var(--line); }
  .item:last-child { border-bottom: 0; }
  .item .t { font-size: 1rem; font-weight: 500; color: var(--ink); line-height: 1.35; }
  .item .d { font-size: 0.87rem; color: var(--ink-2); margin-top: 3px; }
  .wall-empty { color: var(--ink-3); font-size: 0.95rem; }

  /* tabs */
  .tabs { position: fixed; left: 50%; bottom: 0; transform: translateX(-50%); width: 100%; max-width: var(--w); z-index: 40;
    display: grid; grid-template-columns: 1fr 1fr; background: var(--ground); padding-bottom: env(safe-area-inset-bottom); }
  .tab { background: none; border: 0; cursor: pointer; color: oklch(72% 0.02 72); height: var(--tab-h);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    font-family: "DM Sans"; font-size: 0.7rem; font-weight: 500; transition: color .2s var(--ease); position: relative; }
  .tab svg { width: 21px; height: 21px; stroke: currentColor; fill: none; stroke-width: 1.7; }
  .tab.on { color: var(--gold); }
  .tab.on::before { content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 26px; height: 2px; background: var(--gold); border-radius: 2px; }

  /* toast */
  #toast { position: fixed; left: 50%; bottom: calc(var(--tab-h) + env(safe-area-inset-bottom) + 16px); transform: translate(-50%, 140%);
    z-index: 60; background: var(--ink); color: var(--paper); padding: 11px 19px; border-radius: 100px; font-size: 0.86rem;
    opacity: 0; transition: transform .4s var(--ease), opacity .3s var(--ease); white-space: nowrap; }
  #toast.on { transform: translate(-50%, 0); opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <img src="https://eccopts.ca/wp-content/uploads/2020/03/eccopts-logo-temporary-1.png" alt="" referrerpolicy="no-referrer" onerror="this.style.display='none'" />
    <span>The Content Room</span>
  </header>

  <main>
    <section class="view on" id="v-add">
      <h1 class="h-serif">Drop an idea.</h1>
      <p class="sub">Pick a section, type it, done.</p>
      <form id="form" autocomplete="off">
        <span class="lbl">Section</span>
        <div class="chips" id="chips" role="group" aria-label="Section"></div>
        <span class="lbl">The idea</span>
        <input id="f-title" type="text" maxlength="120" placeholder="e.g. Favorite hymn, played under their face" required />
        <span class="lbl">A little more (optional)</span>
        <textarea id="f-details" maxlength="600" placeholder="How you picture it..."></textarea>
        <button class="add-btn" type="submit">Add to the wall</button>
      </form>
    </section>

    <section class="view" id="v-wall">
      <div id="groups"></div>
    </section>
  </main>

  <nav class="tabs">
    <button class="tab on" id="t-add"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>Add</button>
    <button class="tab" id="t-wall"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg>Wall</button>
  </nav>

  <div id="toast"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  "use strict";
  const CATEGORIES = [
    { key:"film", label:"End-of-Camp Film", seeds:[
      { title:'"Who is God to you?"', details:'Everyone, 2 sentences each. Cut faces together, end on silence.' },
      { title:'"This week" recap', details:'Sat + Sun: what do you like most so far? Monday: favorite moment? Cut to one hymn.' } ]},
    { key:"interviews", label:"Interviews", seeds:[
      { title:"World Cup predictions" },
      { title:"Why did you sign up?" },
      { title:"Favorite part of the liturgy", details:"Priest / liturgy vibe quotes." },
      { title:"What did you learn from this topic?" },
      { title:"What will you apply starting now?" } ]},
    { key:"pov", label:"POV", seeds:[
      { title:"POV: you signed up for the church trip", details:"Clip montage." },
      { title:"POV: World Cup final during a convention", details:"The clash, but faith wins." } ]},
    { key:"reels", label:"Reels & Content", seeds:[
      { title:'"Why we come back"', details:"Year-after promo reel." },
      { title:"Day in the life", details:"One servant or youth." },
      { title:"Expectations vs reality" },
      { title:"Convention starter pack", details:"What to pack, but funny." },
      { title:"Tasbeha vibe check", details:"How to perfectly end a convention night." } ]},
    { key:"quickfire", label:"Quickfire", seeds:[
      { title:"What's your favorite hymn?" },
      { title:"Who's your favorite saint?" },
      { title:"In one word, describe your day" } ]},
    { key:"broll", label:"Filming Moments", seeds:[
      { title:"Liturgy" },
      { title:"Tasbeha" } ]},
    { key:"pre", label:"Pre-Convention", seeds:[
      { title:"Ask Tant if we can realize this" } ]},
    { key:"other", label:"Wildcard", seeds:[] },
  ];
  const BY = Object.fromEntries(CATEGORIES.map(c => [c.key, c]));
  const cfg = window.ECCOPTS_CONFIG || {};
  const LIVE = !!(cfg.SUPABASE_URL && cfg.SUPABASE_ANON_KEY);
  let sb = null, ideas = [], chosen = null;
  const seen = new Set();
  const $ = s => document.querySelector(s);
  const esc = s => (s||"").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

  const chips = $("#chips");
  CATEGORIES.forEach(c => {
    const b = document.createElement("button");
    b.type="button"; b.className="chip"; b.setAttribute("aria-pressed","false");
    b.textContent = c.label;
    b.onclick = () => { chosen=c.key; [...chips.children].forEach(x=>x.setAttribute("aria-pressed", x===b)); };
    chips.appendChild(b);
  });

  function render() {
    const g = $("#groups"); g.innerHTML = "";
    CATEGORIES.forEach(c => c._all = c.seeds.map(s => ({ ...s, category:c.key })));
    ideas.forEach(it => (BY[it.category]||BY.other)._all.push(it));
    let any = false;
    CATEGORIES.forEach(c => {
      if (!c._all.length) return;
      any = true;
      const sec = document.createElement("section"); sec.className = "grp";
      let html = '<h3>'+esc(c.label)+'</h3><div class="rule"></div>';
      c._all.forEach(it => {
        html += '<div class="item"><p class="t">'+esc(it.title)+'</p>'+(it.details?'<p class="d">'+esc(it.details)+'</p>':'')+'</div>';
      });
      sec.innerHTML = html; g.appendChild(sec);
    });
    if (!any) g.innerHTML = '<p class="wall-empty">No ideas yet. Add the first one.</p>';
  }

  function tab(v) {
    $("#v-add").classList.toggle("on", v==="add");
    $("#v-wall").classList.toggle("on", v==="wall");
    $("#t-add").classList.toggle("on", v==="add");
    $("#t-wall").classList.toggle("on", v==="wall");
    window.scrollTo(0,0);
  }
  $("#t-add").onclick = () => tab("add");
  $("#t-wall").onclick = () => tab("wall");

  const LS = "eccopts_ideas_v2";
  const loadLocal = () => { try { return JSON.parse(localStorage.getItem(LS))||[]; } catch { return []; } };
  const saveLocal = a => { try { localStorage.setItem(LS, JSON.stringify(a)); } catch {} };

  async function init() {
    if (LIVE && window.supabase) {
      try {
        sb = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
        const { data, error } = await sb.from("ideas").select("*").order("created_at",{ascending:false});
        if (error) throw error;
        ideas = (data||[]).filter(r => r.title !== "setup_connectivity_test");
        ideas.forEach(i => seen.add(i.id));
        sb.channel("rt").on("postgres_changes",{event:"INSERT",schema:"public",table:"ideas"}, pl => {
          const r = pl.new; if (seen.has(r.id) || r.title === "setup_connectivity_test") return;
          seen.add(r.id); ideas.unshift(r); render(); toast("New idea added");
        }).subscribe();
      } catch (e) { console.warn("local mode", e); ideas = loadLocal(); }
    } else { ideas = loadLocal(); }
    render();
  }

  $("#form").addEventListener("submit", async e => {
    e.preventDefault();
    const title = $("#f-title").value.trim();
    if (!chosen) { chips.scrollIntoView({behavior:"smooth",block:"center"}); toast("Pick a section"); return; }
    if (!title) { $("#f-title").focus(); return; }
    const rec = { id:(crypto.randomUUID?crypto.randomUUID():"id"+Date.now()), category:chosen, title, details:$("#f-details").value.trim(), created_at:new Date().toISOString() };
    if (sb) {
      const { error } = await sb.from("ideas").insert({ category:rec.category, title:rec.title, details:rec.details });
      if (error) { toast("Could not save"); return; }
      seen.add(rec.id); ideas.unshift(rec);
    } else { ideas.unshift(rec); saveLocal(ideas); }
    e.target.reset(); chosen = null; [...chips.children].forEach(x=>x.setAttribute("aria-pressed","false"));
    render(); tab("wall"); toast("Added");
  });

  let tt; function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("on"); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove("on"),2600); }

  init();
})();
</script>
</body>
</html>
